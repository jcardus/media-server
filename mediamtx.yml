###############################################
# MediaMTX — Jimi JC400P Media Server
#
# Stream path: /live/{channel}/{imei}
#   e.g. /live/1/862000000000001
###############################################

logLevel: info
logDestinations: [stdout]
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:

# RTMP — JC400P pushes to rtmp://<host>:1936/live/{channel}/{imei}
rtmp: yes
rtmpAddress: :1936

# HLS — viewers pull http://<host>:8881/live/{channel}/{imei}/index.m3u8
hls: yes
hlsAddress: :8881
hlsEncryption: no
hlsVariant: fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 3s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50MB
hlsAllowOrigins: ["*"]

# WebRTC — browsers open http://<host>:8889/live/{channel}/{imei}
webrtcAdditionalHosts: [178.105.126.75]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# REST API disabled; HLS playback does not need it.
api: no
apiAddress: :9997

# live/{ch}/{imei}  — camera pushes RTMP here (AAC audio)
# rtc/{ch}/{imei}   — FFmpeg re-encodes AAC→Opus and republishes here; browsers use WHEP on this path
paths:
  "~^live/.*$":
    runOnReady: ffmpeg -hide_banner -loglevel warning -rtsp_transport tcp -i rtsp://127.0.0.1:8554/$MTX_PATH -c:v copy -c:a libopus -b:a 32k -af aresample=async=1000 -f rtsp -rtsp_transport tcp rtsp://127.0.0.1:8554/rtc/$MTX_PATH
    runOnReadyRestart: yes
  "~^rtc/.*$":
    {}
