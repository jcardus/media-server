###############################################
# MediaMTX — Jimi JC400P Media Server
#
# Stream path: /live/{channel}/{imei}
#   e.g. /live/1/862000000000001
###############################################

logLevel: info
logDestinations: [stdout]
authMethod: internal
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:

# RTMP — JC400P pushes to rtmp://<host>:1936/live/{channel}/{imei}
rtmp: yes
rtmpAddress: :1936

# HLS — viewers pull http://<host>:8881/live/{channel}/{imei}/index.m3u8
hls: yes
hlsAddress: :8881
hlsEncryption: no
hlsVariant: fmp4
hlsSegmentCount: 3
hlsSegmentDuration: 3s
hlsPartDuration: 200ms
hlsSegmentMaxSize: 50MB
hlsAllowOrigins: ["*"]

# WebRTC — browsers open http://<host>:8889/live/{channel}/{imei}
webrtcAdditionalHosts: [178.105.126.75]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# REST API disabled; HLS playback does not need it.
api: no
apiAddress: :9997

# Accept any path the camera registers (live/{channel}/{imei})
# audioEncoder transcodes AAC (from RTMP) → Opus (required by WebRTC)
paths:
  "~^.*$":
    audioEncoder:
      name: opus
