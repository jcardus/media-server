services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "1936:1936"   # RTMP — Jimi cameras push to rtmp://host:1936/live/{channel}/{imei} (DNS-only)
      - "80:8881"     # HLS  — viewers pull http://host/live/{channel}/{imei}/index.m3u8 (Cloudflare-proxied)
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    environment:
      - MTX_LOGLEVEL=info
