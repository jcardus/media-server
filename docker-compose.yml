services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "1936:1936"   # RTMP — Jimi cameras push to rtmp://host:1936/live/{channel}/{imei}
      - "8881:8881"   # HLS  — viewers pull http://host:8881/live/{channel}/{imei}/hls.m3u8
      - "9997:9997"   # REST API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    environment:
      - MTX_LOGLEVEL=info
